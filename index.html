
<!doctype html><html lang="th"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>IT Survey V3.2</title><link rel="stylesheet" href="css/style.css">
<script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script><script src="https://cdn.jsdelivr.net/npm/chart.js"></script></head>
<body><main class="wrap"><header class="hero"><h1>แบบสำรวจความต้องการพัฒนาทักษะด้านเทคโนโลยีดิจิทัล</h1><div id="mode">กำลังตรวจสอบช่องทาง...</div></header>
<nav class="tabs"><button class="tab active" data-p="survey">แบบสอบถาม</button><button class="tab" data-p="dash">ข้อมูลสถิติ</button><button class="tab" data-p="admin">Admin</button></nav>
<div id="notice" class="notice hidden"></div>
<section id="survey" class="panel active"><form id="form">
<div class="card"><h2>ข้อมูลผู้ตอบ</h2>
<div id="liffBox" class="grid hidden"><div><label>LINE User ID</label><input id="lineId" class="input" readonly></div><div><label>ชื่อ LINE</label><input id="lineName" class="input" readonly></div></div>
<div id="webBox" class="grid hidden"><div><label>อีเมล *</label><input id="email" type="email" class="input"></div><div><label>ชื่อ-นามสกุล *</label><input id="fullName" class="input"></div><div class="actions"><button type="button" id="checkEmail" class="btn">ตรวจคำตอบเดิม</button></div></div>
<div class="grid"><div><label>หน่วยงาน *</label><select id="department"></select></div><div><label>ตำแหน่ง *</label><select id="position"></select></div>
<div><label>อายุงาน *</label><select id="work"><option value="">เลือก</option><option>น้อยกว่า 1 ปี</option><option>1-3 ปี</option><option>4-6 ปี</option><option>7-10 ปี</option><option>มากกว่า 10 ปี</option></select></div>
<div><label>ทักษะคอมพิวเตอร์ *</label><select id="skill"><option value="">เลือก</option><option>1</option><option>2</option><option>3</option><option>4</option><option>5</option></select></div>
<div><label>รูปแบบอบรม *</label><select id="training"><option value="">เลือก</option><option>Onsite</option><option>Online</option><option>ทั้งสองแบบ</option></select></div></div></div>
<div id="topics"></div><div class="card"><label>ข้อเสนอแนะ</label><textarea id="comment"></textarea><div class="actions"><button class="btn">บันทึกแบบสอบถาม</button></div></div></form></section>
<section id="dash" class="panel"><div class="stats"><div class="stat">ผู้ตอบทั้งหมด<br><b id="sTotal">0</b></div><div class="stat">หน่วยงาน<br><b id="sDept">0</b></div><div class="stat">LIFF<br><b id="sLiff">0</b></div><div class="stat">Web<br><b id="sWeb">0</b></div></div><div class="card"><div class="chart"><canvas id="chart"></canvas></div></div></section>
<section id="admin" class="panel"><div id="loginCard" class="card"><h2>เข้าสู่ระบบ Admin</h2><div class="grid"><input id="au" class="input" placeholder="Username"><input id="ap" type="password" class="input" placeholder="Password"></div><div class="actions"><button id="loginBtn" class="btn">เข้าสู่ระบบ</button></div></div>
<div id="console" class="hidden"><div class="card"><div class="actions"><button id="csvBtn" class="btn">Export CSV</button></div></div><div class="card"><h2>Setting</h2><div class="grid">
<label>เปิดรับคำตอบ<select id="setOpen"><option>TRUE</option><option>FALSE</option></select></label>
<label>อนุญาตแก้ไข<select id="setEdit"><option>TRUE</option><option>FALSE</option></select></label>
<label>เปิด Dashboard<select id="setDash"><option>TRUE</option><option>FALSE</option></select></label>
<label>โดเมนอีเมล<input id="setDomain" class="input" placeholder="เว้นว่าง = ทุกโดเมน"></label></div><div class="actions"><button id="saveSet" class="btn">บันทึก Setting</button></div></div></div></section>
</main><script src="js/config.js"></script><script src="js/app.js"></script></body></html>
